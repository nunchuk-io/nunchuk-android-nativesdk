name: Build nativesdk

on:
  push:
    branches: [ "*" ]
    tags:     [ "*" ]
  pull_request:
  workflow_dispatch:
    inputs:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Override submodule URL
        run: |
          git config -f .gitmodules submodule.src/main/native/libnunchuk.url https://github.com/nunchuk-io/libnunchuk
          git submodule sync
          git submodule update --init --recursive --depth 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push builder image
        working-directory: ${{ github.workspace }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t ghcr.io/${{ github.repository }}/nunchuk-builder \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/builder-cache \
            --cache-to   type=registry,ref=ghcr.io/${{ github.repository }}/builder-cache,mode=max \
            --push .

      - name: Install dependencies
        run: |
          docker run  --rm \
            -v ${{ github.workspace }}:/nunchuk-android-nativesdk \
            -w /nunchuk-android-nativesdk/src/main/native \
            ghcr.io/${{ github.repository }}/nunchuk-builder \
            bash ./.install_deps.sh

      - name: Build the sdk
        run: |
          docker run  --rm \
            -v ${{ github.workspace }}:/nunchuk-android-nativesdk \
            -w /nunchuk-android-nativesdk \
            ghcr.io/${{ github.repository }}/nunchuk-builder \
            ./gradlew assembleArmRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nativesdk-${{ github.sha }}
          path: build/outputs/aar

      # Auto-publish to the prebuild repo + JitPack on a push to main.
      # Your release flow pushes GitLab -> GitHub main once per release, so a push
      # to main == a release. Publishes version = `def VERSION` in build.gradle
      # (no git tag needed). Requires repo secret NATIVESDK_PUBLISH_TOKEN: a PAT
      # with write access to nunchuk-android-nativesdk-prebuild + nunchuk-android-nativesdk.
      - name: Publish to prebuild repo + JitPack
        if: github.ref == 'refs/heads/main'
        env:
          PUBLISH_TOKEN: ${{ secrets.NATIVESDK_PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "::error title=Missing secret::NATIVESDK_PUBLISH_TOKEN is not set"; exit 1
          fi
          sudo chown -R "$USER" build || true
          python3 -m pip install --quiet --break-system-packages PyGithub
          echo "githubToken=${PUBLISH_TOKEN}" >> local.properties
          python3 upload_aar.py true
